<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인사이트 — 함께워크_SI</title>
<meta name="description" content="대기업 SI · AI · 플랫폼 비즈니스에 대한 함께워크_SI의 인사이트.">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/static/pretendard.css">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/main.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
.blog-shell { max-width: 920px; margin: 0 auto; padding: 80px 32px 96px; }
.blog-hero { text-align: center; margin-bottom: 64px; }
.blog-hero h1 { font-size: 48px; font-weight: 600; color: var(--ink-deep); letter-spacing: -.04em; }
.blog-hero p { color: var(--slate); font-size: 17px; margin-top: 16px; font-weight: 300; }

.blog-list { display: grid; gap: 16px; }
.blog-card {
  background: var(--canvas);
  border: 1px solid var(--hairline-soft);
  border-radius: var(--r-xl);
  padding: 28px;
  cursor: pointer;
  transition: all var(--d-base);
}
.blog-card:hover {
  transform: translateY(-2px);
  border-color: var(--cobalt);
  box-shadow: var(--shadow-md);
}
.blog-card .meta { font-size: 11px; color: var(--steel); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
.blog-card h2 { font-size: 22px; font-weight: 600; color: var(--ink-deep); letter-spacing: -.02em; margin: 8px 0; line-height: 1.3; }
.blog-card p { color: var(--slate); font-size: 14px; line-height: 1.55; }
.blog-card .tags { margin-top: 14px; display: flex; gap: 6px; flex-wrap: wrap; }
.blog-card .tag { font-size: 11px; padding: 3px 10px; background: var(--surface-soft); color: var(--ink); border-radius: var(--r-full); font-weight: 600; }

/* Post detail */
.blog-post { max-width: 720px; margin: 0 auto; padding: 80px 32px 96px; }
.blog-post .back { font-size: 13px; color: var(--cobalt); margin-bottom: 24px; display: inline-flex; align-items: center; gap: 6px; }
.blog-post h1 { font-size: 38px; font-weight: 600; color: var(--ink-deep); letter-spacing: -.04em; line-height: 1.2; }
.blog-post .post-meta { display: flex; gap: 16px; color: var(--steel); font-size: 13px; margin: 16px 0 48px; }
.blog-post .content { font-size: 16px; line-height: 1.8; color: var(--ink); }
.blog-post .content h2 { font-size: 24px; margin: 1.8em 0 0.6em; color: var(--ink-deep); letter-spacing: -.02em; }
.blog-post .content h3 { font-size: 19px; margin: 1.4em 0 0.4em; color: var(--ink-deep); }
.blog-post .content p { margin: 0.8em 0; }
.blog-post .content ul, .blog-post .content ol { padding-left: 24px; margin: 1em 0; }
.blog-post .content li { margin: 0.4em 0; }
.blog-post .content code { background: var(--surface-soft); padding: 2px 8px; border-radius: 4px; font-size: 13px; font-family: var(--font-mono); }
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="brand">
      <span class="brand-dot"></span>
      <span>함께워크_SI</span>
    </a>
    <div class="nav-links">
      <a href="/#why">왜 우리</a>
      <a href="/#pricing">견적</a>
      <a href="/#cases">레퍼런스</a>
      <a href="/blog" style="color:var(--cobalt-deep);font-weight:700">인사이트</a>
      <a href="/#contact" class="cta-btn">30분 무료 상담</a>
    </div>
  </div>
</nav>

<div id="listView">
  <div class="blog-shell">
    <div class="blog-hero">
      <span class="eyebrow">Insights</span>
      <h1 style="margin-top:14px">함께워크_SI 인사이트</h1>
      <p>대기업 SI · AI · 플랫폼 비즈니스에 대한 관점과 데이터.</p>
    </div>
    <div class="blog-list" id="blogList"></div>
  </div>
</div>

<div id="postView" style="display:none">
  <article class="blog-post">
    <a href="/blog" class="back">← 인사이트로 돌아가기</a>
    <h1 id="postTitle"></h1>
    <div class="post-meta">
      <span id="postAuthor"></span>
      <span id="postDate"></span>
      <span id="postRead"></span>
    </div>
    <div class="content" id="postContent"></div>
  </article>
</div>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-brand">함께워크_SI</div>
    <div class="footer-meta">2026 · endyd116@gmail.com</div>
  </div>
</footer>

<script type="module">
import { store, ensureSeed } from './assets/js/store.js';
import { escapeHtml, fmt } from './assets/js/admin-ui.js';

await ensureSeed();

const params = new URLSearchParams(location.search);
const slug = params.get('p');

if (slug) {
  const post = store.posts.all().find(p => p.slug === slug);
  if (post) {
    document.getElementById('listView').style.display = 'none';
    document.getElementById('postView').style.display = 'block';
    document.title = `${post.title} — 함께워크_SI`;
    document.getElementById('postTitle').textContent = post.title;
    document.getElementById('postAuthor').textContent = post.author || '';
    document.getElementById('postDate').textContent = fmt.date(post.published_at);
    document.getElementById('postRead').textContent = `${post.read_min || 5}분`;
    document.getElementById('postContent').innerHTML = window.marked.parse(post.content || '');
  } else {
    document.getElementById('blogList').innerHTML = '<div style="text-align:center;padding:60px;color:var(--steel)">해당 글을 찾을 수 없습니다.</div>';
  }
} else {
  const posts = store.posts.all().filter(p => p.published !== false)
    .sort((a, b) => (b.published_at || '').localeCompare(a.published_at || ''));
  const list = document.getElementById('blogList');
  if (posts.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:60px;color:var(--steel)">아직 발행된 글이 없습니다. 어드민에서 글을 작성해 보세요.</div>';
  } else {
    list.innerHTML = posts.map(p => `
      <a class="blog-card" href="/blog?p=${encodeURIComponent(p.slug)}">
        <div class="meta">${escapeHtml(p.author || '')} · ${fmt.date(p.published_at)} · ${p.read_min || 5}분</div>
        <h2>${escapeHtml(p.title || '')}</h2>
        <p>${escapeHtml(p.excerpt || '')}</p>
        <div class="tags">${(p.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
      </a>
    `).join('');
  }
}
</script>

</body>
</html>
