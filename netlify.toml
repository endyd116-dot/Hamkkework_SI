[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/assets/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[redirects]]
  from = "/api/calendar.ics"
  to = "/.netlify/functions/calendar"
  status = 200

# 허브 SSO(SP) — 계약 경로를 평탄한 함수명으로 매핑 (catch-all 보다 먼저 평가)
[[redirects]]
  from = "/api/sso/enter"
  to = "/.netlify/functions/sso-enter"
  status = 200

[[redirects]]
  from = "/api/sso/session"
  to = "/.netlify/functions/sso-session"
  status = 200

[[redirects]]
  from = "/api/sso/logout"
  to = "/.netlify/functions/sso-logout"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/portal.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200
